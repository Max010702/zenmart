<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../public/css/command.css" />
    <link rel="stylesheet" href="../public/css/login.css" />
  </head>
  <body>
    <div class="login_frame">
      <div class="login_container">
        <p class="login_title">Login</p>
        <div class="input_box">
          <p>Username or email address</p>
          <input type="text" placeholder="Email " />
        </div>
        <div class="input_box">
          <p>Password</p>
          <input type="text" placeholder="Password " />
        </div>
        <div class="extra_info">
          <div class="remember_box">
            <div></div>
            <span>Remember me</span>
          </div>
          <a href="">Lost your password?</a>
        </div>
        <button type="submit">Login</button>
        <p class="create_account">
          Don't have an account? <strong>Create account</strong>
        </p>
        <div class="or_border_part">
          <div class="border_box"></div>
          <div class="or_circle">or</div>
        </div>

        <div class="social_media_boxes">
          <div
            class="facebook_box"
            style="border: 1px solid rgba(25, 103, 210, 1)"
          >
            <i
              class="fa-brands fa-facebook-f"
              style="color: rgb(116, 192, 252)"
            ></i>
          </div>
          <div
            class="google_box"
            style="border: 1px solid rgba(217, 48, 37, 1)"
          >
            <i
              class="fa-brands fa-google"
              style="color: rgba(217, 48, 37, 1)"
            ></i>
          </div>
          <div
            class="twitter_box"
            style="border: 1px solid rgba(45, 154, 220, 1)"
          >
            <i
              class="fa-brands fa-twitter"
              style="color: rgba(45, 154, 220, 1)"
            ></i>
          </div>
          <div class="apple_box" style="border: 1px solid rgba(4, 30, 66, 1)">
            <i class="fa-brands fa-apple" style="color: rgba(4, 30, 66, 1)"></i>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
